# Boot-script workload: PREVIEW. The Substrate API's `launch_configuration`
# shape for non-Docker workloads is still in flux (see open API question #1).
#
# Use cases for boot scripts that Docker can't do well: install custom CUDA
# drivers, clone a private repo, set up a systemd unit that exec's training.

name: bootstrap-cuda
tags:
  - team:research

gpu:
  type: A4000

workload:
  type: boot_script
  steps:
    - apt-get update -y
    - apt-get install -y htop tmux
    - curl -fsSL https://example.com/setup.sh | bash
  ports:
    - 22

lifecycle:
  # No container, no health-check — a plain GPU box with extras installed.
  # Auto-stop after 2 hours so an abandoned shell doesn't burn budget.
  max_runtime: 2h
  wait_until_active: true
