# Docker workload with env shorthand and typed secret refs.
name: docker-secrets-demo
gpu:
  type: A100
  max_price_per_hour: 4
  regions:
    - north america
workload:
  type: docker
  image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
  args:
    - python
    - -c
    - print('hello from substratecloud')
  env:
    HF_TOKEN: { from_env: HF_TOKEN }
    PLAIN: static-value
    SHORT: $OTHER_VAR
lifecycle:
  budget_limit_usd: 10
  wait_until_active: true
  wait_timeout: 900
