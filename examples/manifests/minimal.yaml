# Smallest valid manifest. Deploys with `substrate apply minimal.yaml`.
# Reuses the same instance on repeat invocations (idempotent by `name`).
name: minimal
gpu:
  type: A4000
workload:
  type: docker
  image: nginx:latest
  ports:
    80: 80
lifecycle:
  # `apply` refuses manifests with no safety net by default.
  # Either a budget cap, a max_runtime, or an idle_timeout is required.
  budget_limit_usd: 5
