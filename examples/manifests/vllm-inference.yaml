# Production-shaped inference deploy (Docker + health check + region cap).
name: vllm-mistral
tags:
  - team:platform
gpu:
  type: A100
  count: 1
  max_price_per_hour: 3
  regions:
    - north america
workload:
  type: docker
  image: vllm/vllm-openai:latest
  args:
    - --model
    - mistralai/Mistral-7B-v0.1
  env:
    HF_TOKEN: { from_env: HF_TOKEN }
  ports:
    8000: 8000
  health:
    path: /health
    port: 8000
lifecycle:
  budget_limit_usd: 25
  wait_until_active: true
  wait_timeout: 900
